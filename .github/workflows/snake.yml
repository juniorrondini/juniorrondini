name: Generate Commit Snake

on:
  push:
    branches:
      - main
    paths:
      - README.md
      - .github/workflows/snake.yml
      - scripts/generate-commit-trail.mjs
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    name: Render contribution trail
    runs-on: ubuntu-latest

    steps:
      - name: Checkout profile source
        uses: actions/checkout@v4

      - name: Generate branded commit trail
        run: node scripts/generate-commit-trail.mjs

      - name: Publish SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
